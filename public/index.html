<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeArena - Login</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="index_files/style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#ff4444"/>
                <path d="M12 6v6l4 2" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="12" cy="12" r="8" fill="#ff6666"/>
            </svg>
            <h1>CodeArena</h1>
            <p>Login to continue coding</p>
        </div>

        <div class="role-selector">
            <button class="role-btn active" data-role="user">👤 User</button>
            <button class="role-btn" data-role="admin">👑 Admin</button>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
            <div class="signup-link" style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="/signup" style="color: var(--accent-primary);">Sign up here</a>
            </div>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script src="index_files/script.js"></script>
</body>
</html>
