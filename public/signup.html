<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeArena - Sign Up</title>
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="signup_files/style.css">
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#ff4444"/>
                <path d="M12 6v6l4 2" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="12" cy="12" r="8" fill="#ff6666"/>
            </svg>
            <h1>Create Account</h1>
            <p>Join CodeArena and start coding</p>
        </div>

        <form id="signupForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
                <div class="requirements">At least 3 characters</div>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
                <div class="requirements">At least 6 characters</div>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="signup-btn">Create Account</button>
        </form>

        <div id="message" class="message"></div>
        
        <div class="login-link">
            Already have an account? <a href="/index">Login here</a>
        </div>
    </div>

    <script src="signup_files/script.js"></script>
</body>
</html>
